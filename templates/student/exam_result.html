{% extends "student_base.html" %}
{% block title %}Exam Result - HackWise LMS{% endblock %}
{% block main %}
<div class="max-w-lg mx-auto text-center">
    <div class="card p-8">
        <div class="mb-6">
            <div class="w-16 h-16 rounded-full bg-[rgba(229,9,20,0.1)] flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-[#E50914]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </div>
            <h2 class="text-2xl font-bold text-white">{{ exam.title }}</h2>
            <p class="text-[#A0A0A0] mt-1">Your Result</p>
        </div>

        <div class="text-6xl font-bold mb-4 {% if percentage >= 50 %}text-[#10b981]{% else %}text-[#ef4444]{% endif %}">
            {{ '%.0f'|format(percentage) }}%
        </div>

        <div class="flex items-center justify-center gap-2 mb-8">
            <span class="text-2xl text-white font-semibold">{{ score }}</span>
            <span class="text-[#A0A0A0] text-lg">/</span>
            <span class="text-2xl text-[#A0A0A0]">{{ total }}</span>
            <span class="text-[#A0A0A0] text-sm ml-1">correct</span>
        </div>

        <a href="/student/exams" class="btn-primary px-6 py-2.5 no-underline inline-block">Back to Exams</a>
    </div>
</div>
{% endblock %}
