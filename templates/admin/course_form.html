<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if course %}Edit{% else %}Add{% endif %} Course - LMS Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold text-gray-800">LMS Admin</h1>
            <div class="flex items-center gap-4">
                <span class="text-gray-600">Welcome, {{ admin.username }}</span>
                <a href="/logout" class="bg-red-500 text-white px-4 py-2 rounded-md text-sm hover:bg-red-600 transition">Logout</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="mb-6 flex items-center gap-4">
            <a href="/admin/courses" class="text-blue-600 hover:underline">&larr; Courses</a>
            <h2 class="text-2xl font-semibold text-gray-800">{% if course %}Edit{% else %}Add{% endif %} Course</h2>
        </div>

        {% if error %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">{{ error }}</div>
        {% endif %}

        <div class="bg-white rounded-lg shadow p-6 max-w-lg">
            <form method="POST" action="/admin/courses/{% if course %}{{ course._id }}/edit{% else %}create{% endif %}">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-medium mb-2" for="title">Title</label>
                    <input type="text" name="title" id="title" required value="{{ course.title or '' }}"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-medium mb-2" for="description">Description</label>
                    <textarea name="description" id="description" rows="3"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">{{ course.description or '' }}</textarea>
                </div>
                <button type="submit"
                    class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition">
                    {% if course %}Save Changes{% else %}Add Course{% endif %}
                </button>
            </form>
        </div>
    </main>
</body>
</html>
