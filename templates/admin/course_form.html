{% extends "admin_base.html" %}
{% block title %}{% if course %}Edit{% else %}Add{% endif %} Course - HackWise LMS{% endblock %}
{% set active_page = 'courses' %}
{% block main %}
<div class="mb-6">
    <a href="/admin/courses" class="text-[#A0A0A0] hover:text-[#E50914] text-sm no-underline">&larr; Courses</a>
    <h1 class="text-3xl font-bold text-white mt-2">{% if course %}Edit{% else %}Add{% endif %} Course</h1>
</div>

{% if error %}
<div class="bg-[rgba(239,68,68,0.1)] border border-[rgba(239,68,68,0.2)] text-[#ef4444] px-4 py-3 rounded-lg mb-6 text-sm">{{ error }}</div>
{% endif %}

<div class="card p-6 max-w-lg">
    <form method="POST" action="/admin/courses/{% if course %}{{ course._id }}/edit{% else %}create{% endif %}" class="space-y-5">
        <div>
            <label class="block text-sm font-medium text-[#A0A0A0] mb-2" for="title">Title</label>
            <input type="text" name="title" id="title" required value="{{ course.title or '' }}" class="input-field">
        </div>
        <div>
            <label class="block text-sm font-medium text-[#A0A0A0] mb-2" for="description">Description</label>
            <textarea name="description" id="description" rows="3" class="input-field">{{ course.description or '' }}</textarea>
        </div>
        <button type="submit" class="btn-primary w-full py-2.5">{% if course %}Save Changes{% else %}Add Course{% endif %}</button>
    </form>
</div>
{% endblock %}
