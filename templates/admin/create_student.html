<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Student - LMS Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold text-gray-800">LMS Admin</h1>
            <div class="flex items-center gap-4">
                <span class="text-gray-600">Welcome, {{ admin.username }}</span>
                <a href="/logout" class="bg-red-500 text-white px-4 py-2 rounded-md text-sm hover:bg-red-600 transition">Logout</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="mb-6 flex items-center gap-4">
            <a href="/admin/dashboard" class="text-blue-600 hover:underline">&larr; Dashboard</a>
            <h2 class="text-2xl font-semibold text-gray-800">Create Student</h2>
        </div>

        {% if error %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">{{ error }}</div>
        {% endif %}

        {% if success %}
        <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
            <p class="font-medium">{{ success }}</p>
            <p class="mt-2">Email: <strong>{{ generated_email }}</strong></p>
            <p>Password: <strong>{{ generated_password }}</strong></p>
            <p class="mt-2 text-xs">The student will be required to change this password on first login.</p>
        </div>
        {% endif %}

        <div class="bg-white rounded-lg shadow p-6 max-w-lg">
            <form method="POST" action="/admin/students/create">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-medium mb-2" for="name">Full Name</label>
                    <input type="text" name="name" id="name" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-medium mb-2" for="email">Email</label>
                    <input type="email" name="email" id="email" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <button type="submit"
                    class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition">
                    Create Student
                </button>
            </form>
        </div>
    </main>
</body>
</html>
