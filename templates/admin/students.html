<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students - LMS Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold text-gray-800">LMS Admin</h1>
            <div class="flex items-center gap-4">
                <span class="text-gray-600">Welcome, {{ admin.username }}</span>
                <a href="/logout" class="bg-red-500 text-white px-4 py-2 rounded-md text-sm hover:bg-red-600 transition">Logout</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="mb-6 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="/admin/dashboard" class="text-blue-600 hover:underline">&larr; Dashboard</a>
                <h2 class="text-2xl font-semibold text-gray-800">Students</h2>
            </div>
            <a href="/admin/students/create"
                class="bg-blue-600 text-white px-4 py-2 rounded-md text-sm hover:bg-blue-700 transition">
                + Create Student
            </a>
        </div>

        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="w-full text-left">
                <thead>
                    <tr class="border-b bg-gray-50">
                        <th class="py-3 px-4 text-gray-600 font-medium">Name</th>
                        <th class="py-3 px-4 text-gray-600 font-medium">Email</th>
                        <th class="py-3 px-4 text-gray-600 font-medium">Status</th>
                    </tr>
                </thead>
                <tbody>
                    {% for s in students %}
                    <tr class="border-b">
                        <td class="py-3 px-4">{{ s.name }}</td>
                        <td class="py-3 px-4">{{ s.email }}</td>
                        <td class="py-3 px-4">
                            {% if s.must_change_password %}
                            <span class="text-yellow-600 text-sm">Pending password change</span>
                            {% else %}
                            <span class="text-green-600 text-sm">Active</span>
                            {% endif %}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
