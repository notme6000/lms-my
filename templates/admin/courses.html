<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - LMS Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold text-gray-800">LMS Admin</h1>
            <div class="flex items-center gap-4">
                <span class="text-gray-600">Welcome, {{ admin.username }}</span>
                <a href="/logout" class="bg-red-500 text-white px-4 py-2 rounded-md text-sm hover:bg-red-600 transition">Logout</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="mb-6 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="/admin/dashboard" class="text-blue-600 hover:underline">&larr; Dashboard</a>
                <h2 class="text-2xl font-semibold text-gray-800">Courses</h2>
            </div>
            <a href="/admin/courses/create"
                class="bg-blue-600 text-white px-4 py-2 rounded-md text-sm hover:bg-blue-700 transition">
                + Add Course
            </a>
        </div>

        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="w-full text-left">
                <thead>
                    <tr class="border-b bg-gray-50">
                        <th class="py-3 px-4 text-gray-600 font-medium">Title</th>
                        <th class="py-3 px-4 text-gray-600 font-medium">Description</th>
                        <th class="py-3 px-4 text-gray-600 font-medium">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for c in courses %}
                    <tr class="border-b hover:bg-gray-50">
                        <td class="py-3 px-4 font-medium">{{ c.title }}</td>
                        <td class="py-3 px-4 text-gray-600">{{ c.description or '—' }}</td>
                        <td class="py-3 px-4">
                            <div class="flex gap-2">
                                <a href="/admin/courses/{{ c._id }}/edit"
                                    class="bg-indigo-500 text-white px-3 py-1 rounded text-xs hover:bg-indigo-600 transition">Edit</a>
                                <form method="POST" action="/admin/courses/{{ c._id }}/delete" style="display:inline"
                                    onsubmit="return confirm('Delete {{ c.title }}? This removes all associated enrollments, assessments, and projects.');">
                                    <button type="submit"
                                        class="bg-red-500 text-white px-3 py-1 rounded text-xs hover:bg-red-600 transition">Delete</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            {% if not courses %}
            <p class="text-gray-500 text-center py-8">No courses yet.</p>
            {% endif %}
        </div>
    </main>
</body>
</html>
