<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">Change Password</h1>
        <p class="text-gray-500 text-center mb-6">
            {% if user.must_change_password %}
            You must change your password before continuing.
            {% else %}
            Update your account password.
            {% endif %}
        </p>

        {% if error %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/change-password">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-medium mb-2" for="current_password">Current Password</label>
                <input type="password" name="current_password" id="current_password" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-medium mb-2" for="new_password">New Password</label>
                <input type="password" name="new_password" id="new_password" required minlength="4"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-medium mb-2" for="confirm">Confirm New Password</label>
                <input type="password" name="confirm" id="confirm" required minlength="4"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition">
                Update Password
            </button>
        </form>

        <p class="text-gray-500 text-xs text-center mt-4">
            <a href="/logout" class="text-blue-600 hover:underline">Cancel and logout</a>
        </p>
    </div>
</body>
</html>
