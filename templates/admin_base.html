{% extends "base.html" %}
{% block content %}
<div class="flex min-h-screen">
    <aside class="w-64 bg-[#0a0a0a] border-r border-[rgba(255,255,255,0.07)] flex flex-col fixed h-full z-10">
        <div class="p-5 border-b border-[rgba(255,255,255,0.07)]">
            <a href="/admin/dashboard" class="flex items-center gap-2 no-underline">
                <div class="w-8 h-8 rounded-lg bg-[#E50914] flex items-center justify-center text-white font-bold text-sm font-[family-name:var(--font-d)]">H</div>
                <span class="font-bold text-white text-lg font-['Barlow_Condensed']">HackWise</span>
                <span class="text-[#E50914] font-medium text-xs bg-[rgba(229,9,20,0.1)] px-2 py-0.5 rounded-full">Admin</span>
            </a>
        </div>
        <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
            <a href="/admin/dashboard" class="sidebar-link {% if active_page == 'dashboard' %}active{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Dashboard
            </a>
            <a href="/admin/students" class="sidebar-link {% if active_page == 'students' %}active{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0z"/></svg>
                Students
            </a>
            <a href="/admin/courses" class="sidebar-link {% if active_page == 'courses' %}active{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                Courses
            </a>
            <a href="/admin/batches" class="sidebar-link {% if active_page == 'batches' %}active{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                Batches
            </a>
            <a href="/admin/exams" class="sidebar-link {% if active_page == 'exams' %}active{% endif %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
                Exams
            </a>
        </nav>
        <div class="p-3 border-t border-[rgba(255,255,255,0.07)]">
            <div class="flex items-center gap-3 px-3 py-2 text-sm text-[#A0A0A0]">
                <div class="w-8 h-8 rounded-full bg-[#E50914] flex items-center justify-center text-white font-bold text-xs">{{ admin.username[0]|upper }}</div>
                <div class="flex-1 min-w-0">
                    <p class="text-white font-medium truncate">{{ admin.username }}</p>
                    <p class="text-xs text-[#A0A0A0]">Administrator</p>
                </div>
            </div>
            <a href="/logout" class="sidebar-link mt-1 text-[#ef4444] hover:text-[#ef4444] hover:bg-[rgba(239,68,68,0.05)]">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                Logout
            </a>
        </div>
    </aside>
    <main class="flex-1 ml-64 p-8">
        {% block main %}{% endblock %}
    </main>
</div>
{% endblock %}
