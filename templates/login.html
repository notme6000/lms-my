{% extends "base.html" %}
{% block title %}Login - HackWise LMS{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center p-4" style="background: #050505;">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-80 h-80 bg-[#E50914] opacity-[0.03] rounded-full blur-3xl"></div>
        <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-[#E50914] opacity-[0.03] rounded-full blur-3xl"></div>
    </div>
    <div class="card p-8 w-full max-w-md relative">
        <div class="text-center mb-8">
            <div class="w-14 h-14 rounded-xl bg-[#E50914] flex items-center justify-center text-white font-bold text-xl mx-auto mb-4 font-['Barlow_Condensed']">H</div>
            <h1 class="text-2xl font-bold text-white font-['Barlow_Condensed']">HackWise LMS</h1>
            <p class="text-[#A0A0A0] text-sm mt-1">Sign in to your account</p>
        </div>

        {% if error %}
        <div class="bg-[rgba(239,68,68,0.1)] border border-[rgba(239,68,68,0.2)] text-[#ef4444] px-4 py-3 rounded-lg mb-6 text-sm">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-[#A0A0A0] mb-2" for="username">Username / Email</label>
                <input type="text" name="username" id="username" required placeholder="Enter your username" class="input-field">
            </div>
            <div>
                <label class="block text-sm font-medium text-[#A0A0A0] mb-2" for="password">Password</label>
                <input type="password" name="password" id="password" required placeholder="Enter your password" class="input-field">
            </div>
            <button type="submit" class="btn-primary w-full py-2.5">Sign In</button>
        </form>

    </div>
</div>
{% endblock %}
